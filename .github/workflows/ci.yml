name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Valideer plugin.json
        run: python3 -c "import json; json.load(open('.plugin/plugin.json'))"

      - name: Controleer plugin sync
        run: python3 scripts/generate_plugin.py --check

      - name: Controleer vereiste bestanden
        run: |
          for f in LICENSE README.md CHANGELOG.md CLAUDE.md .plugin/plugin.json .claude-plugin/plugin.json .cursor-plugin/plugin.json; do
            if [ ! -f "$f" ]; then
              echo "FOUT: $f ontbreekt"
              exit 1
            fi
          done
          echo "Alle vereiste bestanden aanwezig"

      - name: Controleer skill structuur
        run: |
          EXPECTED="inet inet-web inet-mail inet-api inet-toolbox"
          for skill in $EXPECTED; do
            if [ ! -f "skills/$skill/SKILL.md" ]; then
              echo "FOUT: skills/$skill/SKILL.md ontbreekt"
              exit 1
            fi
          done
          echo "Alle 5 skills aanwezig"

      - name: Controleer SKILL.md frontmatter
        run: |
          error=0
          for f in skills/*/SKILL.md; do
            if ! head -1 "$f" | grep -q '^---$'; then
              echo "FOUT: $f mist YAML frontmatter"
              error=1
            fi
            if ! grep -q '^name:' "$f"; then
              echo "FOUT: $f mist 'name' in frontmatter"
              error=1
            fi
            if ! grep -q '^description:' "$f"; then
              echo "FOUT: $f mist 'description' in frontmatter"
              error=1
            fi
            if ! grep -q '^model:' "$f"; then
              echo "FOUT: $f mist 'model' in frontmatter"
              error=1
            fi
          done
          if [ $error -eq 1 ]; then exit 1; fi
          echo "Alle skills hebben geldige frontmatter"

      - name: Controleer SKILL.md maximaal 500 regels
        run: |
          error=0
          for f in skills/*/SKILL.md; do
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 500 ]; then
              echo "FOUT: $f heeft $lines regels (max 500)"
              error=1
            else
              echo "OK: $f heeft $lines regels"
            fi
          done
          if [ $error -eq 1 ]; then exit 1; fi
          echo "Alle skills binnen de 500-regels limiet"

      - name: Controleer reference.md aanwezig voor domein-skills
        run: |
          DOMAINS="inet-web inet-mail inet-api inet-toolbox"
          error=0
          for skill in $DOMAINS; do
            if [ ! -f "skills/$skill/reference.md" ]; then
              echo "FOUT: skills/$skill/reference.md ontbreekt"
              error=1
            fi
          done
          if [ $error -eq 1 ]; then exit 1; fi
          echo "Alle domein-skills hebben reference.md"

      - name: Controleer geen hardcoded paden
        run: |
          if grep -r '/Users/' skills/ .claude-plugin/ README.md 2>/dev/null; then
            echo "FOUT: hardcoded gebruikerspaden gevonden"
            exit 1
          fi
          echo "Geen hardcoded paden gevonden"

      - name: Installeer uv
        uses: astral-sh/setup-uv@v7

      - name: Smoke test URL-extractie (verwacht minstens 10 URLs)
        run: |
          uv run python scripts/extract_urls.py \
            --skills-dir skills/ \
            --output /tmp/urls.txt \
            --format lychee
          count=$(wc -l < /tmp/urls.txt)
          echo "Gevonden: $count URLs"
          if [ "$count" -lt 10 ]; then
            echo "FOUT: slechts $count URLs gevonden (verwacht minstens 10)"
            exit 1
          fi
          echo "URL-extractie smoke test geslaagd"

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Installeer uv
        uses: astral-sh/setup-uv@v7

      - name: Ruff check
        run: uvx ruff@0.9.7 check scripts/ $( [ -d tests ] && echo tests/ )

      - name: Ruff format check
        run: uvx ruff@0.9.7 format --check scripts/ $( [ -d tests ] && echo tests/ )

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Installeer uv
        uses: astral-sh/setup-uv@v7

      - name: Draai tests
        run: uv run --group dev pytest -v

  lint-markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Lint markdown bestanden
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: '**/*.md'
