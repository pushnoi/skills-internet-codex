name: Monitoring - Broken Links

on:
  schedule:
    - cron: '0 6 * * *'  # dagelijks 06:00 UTC
  workflow_dispatch:

concurrency:
  group: monitoring-links
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Installeer uv
        uses: astral-sh/setup-uv@v7

      - name: Extraheer URLs uit skill-bestanden
        run: |
          uv run python scripts/extract_urls.py \
            --skills-dir skills/ \
            --output /tmp/urls.txt \
            --format lychee

      - name: Zorg dat labels bestaan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "monitoring" --color "0E8A16" --description "Automatische monitoring" --force 2>/dev/null || true
          gh label create "broken-link" --color "D93F0B" --description "Broken link gedetecteerd" --force 2>/dev/null || true

      - name: Link check met Lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config .lychee.toml
            --no-progress
            /tmp/urls.txt
          token: ${{ secrets.GITHUB_TOKEN }}
          output: /tmp/lychee-report.md
          fail: false

      - name: Verwerk resultaten
        if: steps.lychee.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Broken links gevonden"
          cat /tmp/lychee-report.md

          # Zoek bestaande open issue
          existing=$(gh issue list \
            --label "monitoring,broken-link" \
            --state open \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null || true)

          title="[monitoring] Broken links gedetecteerd ($(date -I))"

          # Schrijf issue body naar bestand om shell-expansie van rapport-inhoud te voorkomen
          {
            echo "## Broken Links Rapport"
            echo ""
            echo "Automatische link check van $(date -I) heeft broken links gevonden."
            echo ""
            echo "<details>"
            echo "<summary>Lychee rapport</summary>"
            echo ""
            cat /tmp/lychee-report.md
            echo ""
            echo "</details>"
            echo ""
            echo "**Actie:** controleer de broken links en pas SKILL.md/reference.md aan indien nodig."
          } > /tmp/issue-body.md

          if [ -n "$existing" ]; then
            echo "Update bestaande issue #$existing"
            gh issue comment "$existing" --body-file /tmp/issue-body.md
          else
            echo "Maak nieuwe issue aan"
            gh issue create \
              --title "$title" \
              --body-file /tmp/issue-body.md \
              --label "monitoring,broken-link"
          fi

      - name: Sluit issue als alles OK
        if: steps.lychee.outputs.exit_code == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh issue list \
            --label "monitoring,broken-link" \
            --state open \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null || true)

          if [ -n "$existing" ]; then
            echo "Alle links OK - sluit issue #$existing"
            gh issue close "$existing" \
              --comment "Alle links zijn weer bereikbaar ($(date -I)). Issue automatisch gesloten."
          fi
